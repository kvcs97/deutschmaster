      const [selected, setSelected] = React.useState(null);
      const [showExp, setShowExp] = React.useState(false);

      const startQuiz = (catIndex) => {
        const pool = catIndex === null ? allQuestions : allQuestions.filter(q => q.catIndex === catIndex);

        setSelectedCat(catIndex);
        setCurrent(0); setSelected(null); setShowExp(false);
        setScore(0); setAnswers([]); setStreak(0); setBestStreak(0);

              <h2 style={S({ fontSize: "1.7rem", margin: "0 0 4px", background: `linear-gradient(90deg, ${grade.color}, #ffd700)`, WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" })}>{grade.text}</h2>
              <p style={S({ color: "#c4b5a0", marginBottom: 22, fontSize: "0.97rem" })}>{grade.hu}</p>
              <div style={S({ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10, marginBottom: 22 })}>
                {[{ label: "Helyes", value: `${score}/${questions.length}`, icon: "✅" }, { label: "Eredmény", value: `${pct}%`, icon: "📊" }, { label: "Max sorozat", value: bestStreak, icon: "🔥" }].map((s, i) => (
                  <div key={i} style={S({ background: "rgba(255,255,255,0.06)", borderRadius: 11, padding: "14px 8px", border: "1px solid rgba(255,215,0,0.17)" })}>
                    <div style={S({ fontSize: "1.2rem", marginBottom: 3 })}>{s.icon}</div>
                    <div style={S({ fontSize: "1.4rem", fontWeight: "bold", color: "#ffd700" })}>{s.value}</div>
                    <div style={S({ fontSize: "0.7rem", color: "#a09080", marginTop: 2 })}>{s.label}</div>
                  </div>
                ))}
              </div>
              <div style={S({ textAlign: "left", marginBottom: 18 })}>
                <h3 style={S({ color: "#ffd700", fontSize: "0.76rem", letterSpacing: 2, textTransform: "uppercase", marginBottom: 8 })}>Válaszaid</h3>
                {answers.map((a, i) => (
                  <div key={i} style={S({ display: "flex", gap: 7, padding: "6px 0", borderBottom: "1px solid rgba(255,255,255,0.05)", fontSize: "0.8rem" })}>
                    <span style={S({ flexShrink: 0 })}>{a.correct ? "✅" : "❌"}</span>
                    <span style={S({ color: a.correct ? "#86efac" : "#fca5a5" })}>{a.question}</span>
                  </div>
                ))}
              </div>
              <div style={S({ display: "flex", flexDirection: "column", gap: 8 })}>
                <button onClick={() => startQuiz(selectedCat)} style={S({ background: "linear-gradient(135deg, #ffd700, #ff8c00)", border: "none", borderRadius: 10, padding: "13px", color: "#1a1a2e", fontWeight: "bold", fontSize: "0.93rem" })}>🔄 Újra próbálom</button>
                <button onClick={() => setScreen("menu")} style={S({ background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.17)", borderRadius: 10, padding: "11px", color: "#f0e6d3", fontSize: "0.93rem" })}>🏠 Főmenü</button>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
